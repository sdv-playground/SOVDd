# SOVD Server Configuration — mock transport demo (no hardware needed)
#
# This file is also the no-config fallback: a bare `sovdd` (run from the repo
# root) serves exactly this config. The [ecu.engine_ecu] section below is the
# demo ECU that used to be hardcoded in sovdd.

[server]
host = "0.0.0.0"
port = 9080
request_timeout_ms = 5000

# Transport configuration
# Options: "socketcan", "someip", "mock"
[transport]
type = "mock"
latency_ms = 10

# SocketCAN configuration (uncomment to use)
# [transport]
# type = "socketcan"
# interface = "can0"
# bitrate = 500000
#
# [transport.isotp]
# tx_id = "0x18DA00F1"
# rx_id = "0x18DAF100"
# tx_padding = 0xCC
# rx_padding = 0xCC
# block_size = 0
# st_min_us = 0
# tx_dl = 8

# Session configuration
[session]
default_session = 0x01
extended_session = 0x03
engineering_session = 0x60

[session.security]
enabled = false
level = 0x01

[session.keepalive]
enabled = true
interval_ms = 2000
suppress_response = true

# Subscription limits
[subscriptions]
max_concurrent = 10
max_params_per_subscription = 50
default_timeout_ms = 30000

# ECU Configuration: VTX ECM
[ecu.vtx_ecm]
id = "vtx_ecm"
name = "VTX ECM"
description = "Vortex Motors Engine Control Module"

[ecu.vtx_ecm.capabilities]
read_data = true
write_data = false
periodic_identifier = true
response_on_event = true
max_dids_per_request = 8
max_periodic_dids = 16

[ecu.vtx_ecm.periodic_rates]
slow_hz = 1
medium_hz = 5
fast_hz = 10

[ecu.vtx_ecm.parameters]
config_file = "parameters/vtx_ecm.toml"

# ECU Configuration: demo Engine ECU
# The demo entities the no-config server exposes (previously hardcoded in
# sovdd's create_mock_backends). Rides the shared mock [transport] above.
[ecu.engine_ecu]
id = "engine_ecu"
name = "Engine Control Module"
description = "Main engine ECU (mock)"

[[ecu.engine_ecu.operations]]
id = "self_test"
name = "Run Self Test"
rid = "0x0203"
description = "Execute ECU self-test routine"
security_level = 0

[[ecu.engine_ecu.outputs]]
id = "throttle_position"
name = "Throttle Position"
ioid = "0xF000"
default_value = "00"
description = "Electronic throttle body position control"
security_level = 1
data_type = "uint8"
unit = "%"
scale = 0.392157
offset = 0.0
min = 0.0
max = 100.0

[[ecu.engine_ecu.outputs]]
id = "fuel_injector_1"
name = "Fuel Injector #1"
ioid = "0xF001"
default_value = "00"
description = "Cylinder 1 fuel injector actuation"
security_level = 1

[[ecu.engine_ecu.outputs]]
id = "check_engine_light"
name = "Check Engine Light (MIL)"
ioid = "0xF010"
default_value = "00"
description = "Malfunction Indicator Lamp control"
security_level = 0
data_type = "uint8"
allowed = ["off", "on"]

[[ecu.engine_ecu.outputs]]
id = "cooling_fan"
name = "Cooling Fan Relay"
ioid = "0xF020"
default_value = "00"
description = "Engine cooling fan relay control"
security_level = 0
data_type = "uint8"
allowed = ["off", "on"]
